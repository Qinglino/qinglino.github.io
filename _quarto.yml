project:
  type: website
  output-dir: docs
  resources:
    - CNAME

website:
  title: "Qinglin Ouyang"

format:
  html:
    theme: cosmo
    css: styles.css
    toc: false
    page-layout: full
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/academicons@1.9.1/css/academicons.min.css">
    include-after-body:
      text: |
        <script>
        document.querySelectorAll('a[href]:not([href^="#"])').forEach(function(a) {
          a.setAttribute('target', '_blank');
          a.setAttribute('rel', 'noopener');
        });
        </script>
        <!-- Statcounter -->
        <script type="text/javascript">
        var sc_project=13184887;
        var sc_invisible=1;
        var sc_security="72629082";
        </script>
        <script type="text/javascript" src="https://www.statcounter.com/counter/counter.js" async></script>
        <noscript><div class="statcounter"><a title="Web Analytics" href="https://statcounter.com/" target="_blank"><img class="statcounter" src="https://c.statcounter.com/13184887/0/72629082/1/" alt="Web Analytics" referrerPolicy="no-referrer-when-downgrade"></a></div></noscript>
